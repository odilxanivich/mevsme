<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>mevsme</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #fafaf8;
    --ink: #0d0d0d;
    --ink-soft: #2a2a2a;
    --ink-muted: #888;
    --accent: #0d0d0d;
    --border: rgba(0,0,0,0.09);
    --goosebump-size: 1px;
  }

  html, body {
    height: 100%;
    background: var(--white);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    overflow-x: hidden;
  }

  /* Goosebump / skin-pore background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.015) 1px, transparent 1px),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.012) 1px, transparent 1px),
      radial-gradient(circle at 55% 15%, rgba(0,0,0,0.01) 1px, transparent 1px),
      radial-gradient(circle at 10% 85%, rgba(0,0,0,0.013) 1px, transparent 1px),
      radial-gradient(circle at 90% 10%, rgba(0,0,0,0.011) 1px, transparent 1px),
      radial-gradient(circle at 40% 60%, rgba(0,0,0,0.009) 1.5px, transparent 1.5px),
      radial-gradient(circle at 65% 45%, rgba(0,0,0,0.008) 1px, transparent 1px),
      radial-gradient(circle at 30% 75%, rgba(0,0,0,0.01) 1px, transparent 1px);
    background-size: 60px 60px, 80px 80px, 45px 45px, 70px 70px, 55px 55px, 90px 90px, 50px 50px, 75px 75px;
    filter: url(#grain);
  }

  /* SVG grain filter */
  .grain-filter { position: fixed; top: -9999px; }

  /* ─── PAGES ─── */
  .page { position: fixed; inset: 0; display: flex; flex-direction: column; transition: transform 0.55s cubic-bezier(0.77,0,0.175,1), opacity 0.55s ease; z-index: 1; }
  .page.hidden { transform: translateY(100%); opacity: 0; pointer-events: none; }

  /* ─── MAIN PAGE ─── */
  #main {
    justify-content: center;
    align-items: center;
    gap: 0;
  }

  .main-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    user-select: none;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.18em;
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-muted);
    text-transform: uppercase;
  }

  .logo-dot {
    width: 7px; height: 7px;
    border: 1.5px solid var(--ink);
    border-radius: 50%;
    display: inline-block;
  }

  .plus-btn {
    width: 44px; height: 44px;
    border: 1.5px solid var(--ink);
    border-radius: 50%;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    color: var(--ink);
    transition: background 0.2s, color 0.2s, transform 0.15s;
    margin-top: 8px;
    font-family: 'Space Mono', monospace;
    line-height: 1;
  }
  .plus-btn:hover { background: var(--ink); color: var(--white); transform: rotate(90deg); }

  /* ─── HERO / CAROUSEL ─── */
  .hero-wrap {
    position: relative;
    overflow: hidden;
    width: min(90vw, 520px);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hero-text {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: clamp(52px, 12vw, 96px);
    letter-spacing: -0.02em;
    line-height: 0.92;
    text-align: center;
    color: var(--ink);
    position: relative;
    will-change: transform, opacity;
    transition: transform 0.42s cubic-bezier(0.77,0,0.175,1), opacity 0.42s ease;
    width: 100%;
  }

  .hero-text::after {
    content: '';
    position: absolute;
    bottom: -6px; left: 0; right: 0;
    height: 1.5px;
    background: var(--ink);
    transform: scaleX(0);
    transform-origin: left;
    animation: underline-in 0.9s 0.4s cubic-bezier(0.77,0,0.175,1) forwards;
  }

  @keyframes underline-in { to { transform: scaleX(1); } }

  /* slide animations */
  .hero-text.slide-out-left  { transform: translateX(-60px); opacity: 0; pointer-events: none; }
  .hero-text.slide-out-right { transform: translateX(60px);  opacity: 0; pointer-events: none; }
  .hero-text.slide-in-left   { transform: translateX(60px);  opacity: 0; }
  .hero-text.slide-in-right  { transform: translateX(-60px); opacity: 0; }

  /* dot indicators */
  .hero-dots {
    display: flex;
    gap: 6px;
    margin-top: 18px;
    min-height: 8px;
    align-items: center;
  }
  .hero-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--border);
    border: 1px solid var(--ink-muted);
    transition: background 0.2s, transform 0.2s;
    cursor: pointer;
  }
  .hero-dot.active {
    background: var(--ink);
    border-color: var(--ink);
    transform: scale(1.25);
  }

  /* swipe hint */
  .swipe-hint {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-top: 6px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .swipe-hint.visible { opacity: 1; }

  /* ─── PANEL PAGE ─── */
  #panel {
    justify-content: space-between;
    max-width: 520px;
    margin: 0 auto;
    width: 100%;
    background: var(--white);
  }

  .panel-header {
    padding: 52px 28px 20px;
    border-bottom: 1px solid var(--border);
  }

  .panel-title-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }

  .panel-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  .back-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    padding: 4px 0;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--ink); }

  .panel-subtitle {
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Input area */
  .input-area {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
  }

  .thought-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--ink);
    padding: 10px 0 8px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--ink);
    outline: none;
    letter-spacing: 0.01em;
    transition: border-color 0.2s;
    resize: none;
  }
  .thought-input::placeholder { color: var(--ink-muted); }
  .thought-input:focus { border-bottom-color: var(--ink); }

  .input-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
  }

  .btn-add {
    background: var(--ink);
    color: var(--white);
    border: none;
    padding: 8px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-add:hover { opacity: 0.8; }
  .btn-add:active { transform: scale(0.97); }

  .btn-cancel {
    background: transparent;
    color: var(--ink-muted);
    border: 1px solid var(--border);
    padding: 8px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    display: none;
  }
  .btn-cancel.visible { display: inline-block; }
  .btn-cancel:hover { border-color: var(--ink); color: var(--ink); }

  /* Thoughts list */
  .thoughts-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .thought-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    animation: slide-in 0.3s cubic-bezier(0.22,1,0.36,1) forwards;
    transition: background 0.15s;
  }
  .thought-item:hover { background: rgba(0,0,0,0.015); }

  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .thought-num {
    font-size: 10px;
    color: var(--ink-muted);
    font-family: 'Space Mono', monospace;
    min-width: 22px;
    padding-top: 3px;
    letter-spacing: 0.05em;
  }

  .thought-content {
    flex: 1;
  }

  .thought-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    color: var(--ink);
    line-height: 1.4;
    word-break: break-word;
  }

  .thought-text.editing {
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--ink);
    outline: none;
    width: 100%;
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    color: var(--ink);
    line-height: 1.4;
    padding: 0 0 4px;
    resize: none;
  }

  .thought-date {
    font-size: 10px;
    color: var(--ink-muted);
    margin-top: 3px;
    letter-spacing: 0.05em;
  }

  .thought-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.2s;
    padding-top: 2px;
  }
  .thought-item:hover .thought-actions { opacity: 1; }

  .action-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.15s;
    border-bottom: 1px solid transparent;
  }

  .edit-btn { color: var(--ink-muted); }
  .edit-btn:hover { color: var(--ink); border-bottom-color: var(--ink); }

  .delete-btn { color: #c0392b; }
  .delete-btn:hover { color: #e74c3c; border-bottom-color: #e74c3c; }

  .save-btn { color: var(--ink); display: none; }
  .save-btn:hover { border-bottom-color: var(--ink); }
  .save-btn.visible { display: inline-block; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 28px;
    gap: 8px;
    opacity: 0.35;
  }
  .empty-state .e-icon { font-size: 28px; }
  .empty-state .e-text {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ─── FOOTER ─── */
  .panel-footer {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-links {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .footer-link {
    color: var(--ink-muted);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .footer-link:hover { color: var(--ink); }
  .footer-link svg { width: 13px; height: 13px; fill: currentColor; }

  .footer-credit {
    font-size: 10px;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
    text-align: right;
    line-height: 1.5;
  }
  .footer-credit strong { color: var(--ink); font-weight: 700; }

  /* ─── ENTRANCE ANIMATIONS ─── */
  .main-inner > * {
    opacity: 0;
    transform: translateY(18px);
    animation: fade-up 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  .main-inner > *:nth-child(1) { animation-delay: 0.05s; }
  .main-inner > *:nth-child(2) { animation-delay: 0.15s; }
  .main-inner > *:nth-child(3) { animation-delay: 0.28s; }

  @keyframes fade-up {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── NOTIFICATION ─── */
  .notif {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 22px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
    z-index: 100;
  }
  .notif.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Scrollbar */
  .thoughts-list::-webkit-scrollbar { width: 3px; }
  .thoughts-list::-webkit-scrollbar-track { background: transparent; }
  .thoughts-list::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<!-- Grain SVG filter -->
<svg class="grain-filter" xmlns="http://www.w3.org/2000/svg">
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feBlend in="SourceGraphic" mode="multiply"/>
  </filter>
</svg>

<!-- Notification -->
<div class="notif" id="notif"></div>

<!-- ═══════════════ MAIN PAGE ═══════════════ -->
<div class="page" id="main">

    <button class="plus-btn" id="go-panel" title="My Panel">+</button>
  </div>
</div>

<!-- ═══════════════ PANEL PAGE ═══════════════ -->

  <div class="panel-header">

    </div>
    <div class="panel-subtitle">what is on your mind</div>

  <div class="input-area">
    <textarea class="thought-input" id="thought-input" rows="1" placeholder="just fuck it."></textarea>
    <div class="input-actions">
      <button class="btn-cancel" id="btn-cancel">cancel</button>

<script>
  // ─── State ───
  let thoughts = JSON.parse(localStorage.getItem('mevsme_thoughts') || '[]');
  let editingId = null;
  let carouselIdx = 0;
  let isAnimating = false;

  // ─── DOM refs ───
  const mainPage    = document.getElementById('main');
  const panelPage   = document.getElementById('panel');
  const goPanelBtn  = document.getElementById('go-panel');
  const goMainBtn   = document.getElementById('go-main');
  const thoughtInput= document.getElementById('thought-input');
  const btnAdd      = document.getElementById('btn-add');
  const btnCancel   = document.getElementById('btn-cancel');
  const thoughtsList= document.getElementById('thoughts-list');
  const emptyState  = document.getElementById('empty-state');
  const notif       = document.getElementById('notif');
  const heroText    = document.getElementById('hero-text');
  const heroDots    = document.getElementById('hero-dots');
  const swipeHint   = document.getElementById('swipe-hint');

  // ─── Navigation ───
  goPanelBtn.addEventListener('click', () => {
    mainPage.classList.add('hidden');
    panelPage.classList.remove('hidden');
    renderList();
  });

  goMainBtn.addEventListener('click', () => {
    panelPage.classList.add('hidden');
    mainPage.classList.remove('hidden');
    updateCarousel();
  });

  // ─── Carousel ───
  function getCarouselTexts() {
    // default + all thought texts
    const base = ['just<br>fuck it.'];
    thoughts.forEach(t => base.push(escHtml(t.text)));
    return base;
  }

  function updateCarousel() {
    const texts = getCarouselTexts();
    const count = texts.length;
    if (carouselIdx >= count) carouselIdx = 0;

    heroText.innerHTML = texts[carouselIdx];

    // dots
    heroDots.innerHTML = '';
    if (count >= 2) {
      texts.forEach((_, i) => {
        const d = document.createElement('span');
        d.className = 'hero-dot' + (i === carouselIdx ? ' active' : '');
        d.addEventListener('click', () => goToSlide(i));
        heroDots.appendChild(d);
      });
      swipeHint.classList.add('visible');
    } else {
      swipeHint.classList.remove('visible');
    }
  }

  function goToSlide(idx, direction) {
    const texts = getCarouselTexts();
    if (isAnimating || idx === carouselIdx || texts.length < 2) return;
    isAnimating = true;

    const dir = direction !== undefined ? direction : (idx > carouselIdx ? 'left' : 'right');
    const outClass = dir === 'left' ? 'slide-out-left' : 'slide-out-right';
    const inClass  = dir === 'left' ? 'slide-in-left'  : 'slide-in-right';

    heroText.classList.add(outClass);

    setTimeout(() => {
      carouselIdx = idx;
      heroText.innerHTML = texts[carouselIdx];
      heroText.classList.remove(outClass);
      heroText.classList.add(inClass);

      // force reflow
      heroText.offsetHeight;
      heroText.classList.remove(inClass);

      // update dots
      document.querySelectorAll('.hero-dot').forEach((d, i) => {
        d.classList.toggle('active', i === carouselIdx);
      });

      setTimeout(() => { isAnimating = false; }, 420);
    }, 420);
  }

  function slideNext() {
    const texts = getCarouselTexts();
    const next = (carouselIdx + 1) % texts.length;
    goToSlide(next, 'left');
  }

  function slidePrev() {
    const texts = getCarouselTexts();
    const prev = (carouselIdx - 1 + texts.length) % texts.length;
    goToSlide(prev, 'right');
  }

  // ─── Touch / Swipe ───
  let touchStartX = 0, touchStartY = 0;

  mainPage.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  mainPage.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
    if (getCarouselTexts().length < 2) return;
    dx < 0 ? slideNext() : slidePrev();
  }, { passive: true });

  // ─── Mouse drag (desktop) ───
  let mouseStartX = 0, mouseDown = false;
  mainPage.addEventListener('mousedown', e => { mouseDown = true; mouseStartX = e.clientX; });
  mainPage.addEventListener('mouseup', e => {
    if (!mouseDown) return;
    mouseDown = false;
    const dx = e.clientX - mouseStartX;
    if (Math.abs(dx) < 50 || getCarouselTexts().length < 2) return;
    dx < 0 ? slideNext() : slidePrev();
  });
  mainPage.addEventListener('mouseleave', () => { mouseDown = false; });

  // ─── Keyboard ───
  document.addEventListener('keydown', e => {
    if (!mainPage.classList.contains('hidden')) {
      if (e.key === 'ArrowRight') slideNext();
      if (e.key === 'ArrowLeft')  slidePrev();
    }
  });

  // ─── Input auto-grow ───
  thoughtInput.addEventListener('input', () => {
    thoughtInput.style.height = 'auto';
    thoughtInput.style.height = thoughtInput.scrollHeight + 'px';
    btnCancel.classList.toggle('visible', thoughtInput.value.trim().length > 0);
  });

  btnCancel.addEventListener('click', () => {
    thoughtInput.value = '';
    thoughtInput.style.height = 'auto';
    btnCancel.classList.remove('visible');
    editingId = null;
    btnAdd.textContent = '+ add';
  });

  // ─── CRUD ───
  function save() {
    localStorage.setItem('mevsme_thoughts', JSON.stringify(thoughts));
  }

  function showNotif(msg) {
    notif.textContent = msg;
    notif.classList.add('show');
    setTimeout(() => notif.classList.remove('show'), 1800);
  }

  function now() {
    return new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
  }

  btnAdd.addEventListener('click', () => {
    const text = thoughtInput.value.trim();
    if (!text) return;

    if (editingId !== null) {
      const t = thoughts.find(t => t.id === editingId);
      if (t) { t.text = text; t.edited = now(); }
      editingId = null;
      btnAdd.textContent = '+ add';
      showNotif('updated.');
    } else {
      thoughts.unshift({ id: Date.now(), text, date: now(), edited: null });
      showNotif('added.');
    }

    save();
    renderList();
    thoughtInput.value = '';
    thoughtInput.style.height = 'auto';
    btnCancel.classList.remove('visible');
  });

  thoughtInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); btnAdd.click(); }
  });

  function startEdit(id) {
    const t = thoughts.find(t => t.id === id);
    if (!t) return;
    thoughtInput.value = t.text;
    thoughtInput.style.height = 'auto';
    thoughtInput.style.height = thoughtInput.scrollHeight + 'px';
    thoughtInput.focus();
    editingId = id;
    btnAdd.textContent = 'save';
    btnCancel.classList.add('visible');
    thoughtInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function deleteThought(id) {
    // if this thought is currently shown on main, reset to 0
    const idx = thoughts.findIndex(t => t.id === id);
    if (idx !== -1 && (idx + 1) === carouselIdx) carouselIdx = 0;
    thoughts = thoughts.filter(t => t.id !== id);
    save();
    renderList();
    updateCarousel();
    showNotif('deleted.');
  }

  // ─── Render panel list ───
  function renderList() {
    document.querySelectorAll('.thought-item').forEach(el => el.remove());

    if (thoughts.length === 0) {
      emptyState.style.display = 'flex';
      return;
    }
    emptyState.style.display = 'none';

    thoughts.forEach((t, i) => {
      const item = document.createElement('div');
      item.className = 'thought-item';
      item.dataset.id = t.id;
      item.innerHTML = `
        <span class="thought-num">${String(i + 1).padStart(2, '0')}.</span>
        <div class="thought-content">
          <div class="thought-text">${escHtml(t.text)}</div>
          <div class="thought-date">${t.edited ? 'edited ' + t.edited : t.date}</div>
        </div>
        <div class="thought-actions">
          <button class="action-btn edit-btn" data-id="${t.id}">edit</button>
          <button class="action-btn delete-btn" data-id="${t.id}">del</button>
        </div>
      `;
      thoughtsList.appendChild(item);
    });

    document.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', () => startEdit(Number(btn.dataset.id)));
    });
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteThought(Number(btn.dataset.id)));
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── Init ───
  updateCarousel();
  renderList();
</script>
</body>
</html>
